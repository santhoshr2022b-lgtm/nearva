<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Nearva - Map</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link rel="stylesheet" href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css" />
    <script src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js"></script>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="{{ url_for('static', path='css/style.css') }}?v=9.1">
    <style>
        body {
            font-family: 'Inter', sans-serif;
            background-color: #F8FAFC;
            overflow: hidden !important;
            height: 100dvh !important;
            width: 100vw !important;
            position: relative !important;
        }

        .no-scrollbar::-webkit-scrollbar {
            display: none;
        }

        .no-scrollbar {
            -ms-overflow-style: none;
            scrollbar-width: none;
        }

        /* Glassmorphism utility */
        .glass {
            background: rgba(255, 255, 255, 0.9);
            backdrop-filter: blur(12px);
            -webkit-backdrop-filter: blur(12px);
        }

        /* Marker Pulse/Glow Animation */
        @keyframes pulse-glow {
            0% {
                box-shadow: 0 0 0 0 rgba(34, 197, 94, 0.4);
            }

            70% {
                box-shadow: 0 0 0 10px rgba(34, 197, 94, 0);
            }

            100% {
                box-shadow: 0 0 0 0 rgba(34, 197, 94, 0);
            }
        }

        .gps-glow {
            animation: pulse-glow 2s infinite;
        }

        /* Leaflet Control Overrides */
        .leaflet-control-zoom {
            border: none !important;
            box-shadow: 0 4px 6px -1px rgba(0, 0, 0, 0.1) !important;
            border-radius: 12px !important;
            overflow: hidden;
        }

        .leaflet-bar a {
            background-color: #ffffff !important;
            color: #4B5563 !important;
            border: none !important;
        }

        .leaflet-bar a:hover {
            color: #2563EB !important;
        }

        /* Map Style Bottom Sheet Animation */
        #map-style-sheet {
            transition: transform 0.3s cubic-bezier(0.4, 0, 0.2, 1);
            transform: translateY(100%);
        }

        #map-style-sheet.open {
            transform: translateY(0);
        }

        /* Custom Popup Styling */
        .custom-popup-card .leaflet-popup-content-wrapper {
            border-radius: 16px;
            box-shadow: 0 10px 15px -3px rgba(0, 0, 0, 0.1);
            padding: 0;
            overflow: hidden;
        }

        .custom-popup-card .leaflet-popup-content {
            margin: 0 !important;
            width: 280px !important;
        }

        .custom-popup-card .leaflet-popup-tip-container {
            display: none;
        }

        /* Radius Circle Pulse */
        @keyframes radial-pulse {
            0% {
                stroke-opacity: 0.8;
                fill-opacity: 0.1;
            }

            50% {
                stroke-opacity: 0.4;
                fill-opacity: 0.05;
            }

            100% {
                stroke-opacity: 0.8;
                fill-opacity: 0.1;
            }
        }

        /* Skeleton/Pulse animation for loading */
        @keyframes skeleton-pulse {
            0% {
                opacity: 0.5;
            }

            50% {
                opacity: 1;
            }

            100% {
                opacity: 0.5;
            }
        }

        .animate-skeleton {
            animation: skeleton-pulse 1.5s infinite ease-in-out;
        }

        /* Sticky below search class */
        .sticky-below-search {
            position: sticky;
            top: 0;
            z-index: 1001;
        }

        /* Production-Grade Worker Profile UI (Responsive) */
        #worker-profile-sheet {
            z-index: 6000 !important;
            transition: transform 0.5s cubic-bezier(0.16, 1, 0.3, 1), opacity 0.4s ease;
            will-change: transform, opacity;
            max-height: 90vh;
            backface-visibility: hidden;
            -webkit-font-smoothing: antialiased;
        }

        /* Mobile View (Bottom Sheet) */
        @media (max-width: 767px) {
            #worker-profile-sheet {
                left: 0;
                right: 0;
                bottom: 0;
                transform: translateY(100%);
                border-radius: 2.5rem 2.5rem 0 0;
                width: 100%;
                box-shadow: 0 -15px 50px rgba(0, 0, 0, 0.2);
            }

            #worker-profile-sheet.open {
                transform: translateY(0);
            }
        }

        /* Desktop/Laptop View (Centered Modal) */
        @media (min-width: 768px) {
            #worker-profile-sheet {
                left: 50%;
                top: 50%;
                bottom: auto;
                width: 480px;
                transform: translate(-50%, -40%) scale(0.95);
                opacity: 0;
                border-radius: 2rem;
                pointer-events: none;
            }

            #worker-profile-sheet.open {
                transform: translate(-50%, -50%) scale(1);
                opacity: 1;
                pointer-events: auto;
            }
        }

        #sheet-overlay {
            z-index: 5500 !important;
            background: rgba(15, 23, 42, 0.5);
            /* Darker, more premium slate */
            backdrop-filter: blur(10px);
            -webkit-backdrop-filter: blur(10px);
            transition: opacity 0.4s cubic-bezier(0.16, 1, 0.3, 1);
            will-change: opacity;
            pointer-events: none;
        }

        #sheet-overlay.active {
            opacity: 1;
            pointer-events: auto;
        }

        .sheet-container {
            padding-bottom: env(safe-area-inset-bottom);
        }

        /* Smooth Marker Gliding (Uber/Swiggy style) */
        .leaflet-marker-pane .leaflet-marker-icon {
            transition: transform 0.6s cubic-bezier(0.16, 1, 0.3, 1), opacity 0.3s ease-out;
        }

        .leaflet-marker-pane .leaflet-marker-shadow {
            transition: transform 0.6s cubic-bezier(0.16, 1, 0.3, 1);
        }

        /* GPS Follow Me Mode Style */
        .gps-following {
            color: #2563EB !important;
            background-color: #EFF6FF !important;
            border-color: #3B82F6 !important;
            box-shadow: 0 0 15px rgba(59, 130, 246, 0.4) !important;
        }

        /* Marker Fade In */
        .leaflet-marker-icon {
            transition: opacity 0.3s ease-out;
        }
    </style>
</head>

<body class="bg-gray-50 min-h-screen w-screen flex flex-col">

    <!-- Map Container -->
    <div id="map" class="absolute inset-0 z-0"></div>

    <!-- UI Overlay (Floating) -->
    <div class="absolute inset-x-0 top-0 z-[1000] p-4 flex flex-col gap-3 pointer-events-none">

        <!-- Top Header Controls (Back & Map Type) -->
        <div class="flex justify-between items-start w-full pointer-events-none">
            <div class="flex flex-col gap-3 items-start">
                <a href="/"
                    class="pointer-events-auto glass p-2 rounded-2xl shadow-sm border border-white/50 flex items-center justify-center hover:shadow-md transition-all active:scale-95">
                    <img src="{{ url_for('static', path='images/nearva_logo.png') }}?v={{ range(1, 10000) | random }}"
                        class="h-8 w-auto" alt="Nearva Logo">
                </a>
            </div>

            <div class="flex flex-col gap-2 items-end">
                <button onclick="toggleMapStyleSheet()"
                    class="pointer-events-auto glass w-11 h-11 rounded-full shadow-sm border border-white/50 flex items-center justify-center text-gray-700 hover:text-blue-600 transition-all active:scale-95">
                    <svg xmlns="http://www.w3.org/2000/svg" class="h-6 w-6" fill="none" viewBox="0 0 24 24"
                        stroke="currentColor">
                        <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2"
                            d="M9 20l-5.447-2.724A1 1 0 013 16.382V5.618a1 1 0 011.447-.894L9 7m0 13l6-3m-6 3V7m6 10l4.553 2.276A1 1 0 0021 18.382V7.618a1 1 0 00-.553-.894L15 4m0 13V4m0 0L9 7" />
                    </svg>
                </button>
                <button onclick="toggleLanguage()" id="lang-display"
                    class="pointer-events-auto glass px-4 py-2 rounded-xl shadow-sm border border-white/50 text-xs font-bold text-blue-600 hover:bg-white transition-all active:scale-95">
                    EN | தமிழ்
                </button>
            </div>
        </div>

        <!-- Google Maps Style Search Bar -->
        <div class="pointer-events-auto relative mt-2">
            <div
                class="glass rounded-2xl shadow-lg border border-white/50 flex items-center px-4 py-3.5 transition-all focus-within:ring-2 focus-within:ring-blue-500/20">
                <div class="text-blue-600 mr-3">
                    <svg xmlns="http://www.w3.org/2000/svg" class="h-5 w-5" fill="none" viewBox="0 0 24 24"
                        stroke="currentColor">
                        <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2"
                            d="M17.657 16.657L13.414 20.9a1.998 1.998 0 01-2.827 0l-4.244-4.243a8 8 0 1111.314 0z" />
                        <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2"
                            d="M15 11a3 3 0 11-6 0 3 3 0 016 0z" />
                    </svg>
                </div>
                <input type="text" id="map-search" placeholder="Search visible area..."
                    data-en-placeholder="Search visible area..." data-ta-placeholder="அருகிலுள்ள இடத்தைத் தேடுங்கள்..."
                    class="bg-transparent border-none outline-none w-full text-[15px] font-medium text-gray-800 placeholder-gray-400"
                    oninput="handleSearchInput(this.value)" onkeydown="if(event.key==='Enter') manualSearch()">
                <div class="flex items-center gap-3 pl-2 border-l border-gray-100 ml-2">
                    <button onclick="manualSearch()" class="text-gray-400 hover:text-blue-600 transition-colors">
                        <svg xmlns="http://www.w3.org/2000/svg" class="h-5 w-5" fill="none" viewBox="0 0 24 24"
                            stroke="currentColor">
                            <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2"
                                d="M21 21l-6-6m2-5a7 7 0 11-14 0 7 7 0 0114 0z" />
                        </svg>
                    </button>
                </div>
            </div>

            <!-- Suggestions -->
            <div id="search-suggestions"
                class="absolute top-full left-0 right-0 mt-2 bg-white/95 backdrop-blur-xl rounded-2xl shadow-2xl border border-gray-100 hidden overflow-hidden max-h-72 overflow-y-auto">
            </div>
        </div>

        <!-- Unified Filter Chips (Horizontally Scrollable) -->
        <div class="pointer-events-auto overflow-hidden relative">
            <div id="filter-container"
                class="flex items-center gap-2 overflow-x-auto no-scrollbar py-1 -mx-4 px-4 h-12">
                <!-- Status Filters -->
                <button onclick="filterByAvailability('All')" id="filter-all" data-en="All" data-ta="அனைத்தும்"
                    class="flex-shrink-0 px-4 py-1.5 rounded-full bg-blue-600 text-white text-[13px] font-semibold border border-blue-600 shadow-sm transition-all active:scale-95">
                    All
                </button>
                <button onclick="filterByAvailability('Available')" id="filter-available" data-en="Available"
                    data-ta="ஆன்லைன்"
                    class="flex-shrink-0 px-4 py-1.5 rounded-full bg-white text-gray-600 text-[13px] font-semibold border border-gray-100 shadow-sm transition-all active:scale-95">
                    Available
                </button>
                <button onclick="filterByAvailability('Offline')" id="filter-offline" data-en="Offline"
                    data-ta="ஆஃப்லைன்"
                    class="flex-shrink-0 px-4 py-1.5 rounded-full bg-white text-gray-600 text-[13px] font-semibold border border-gray-100 shadow-sm transition-all active:scale-95">
                    Offline
                </button>

                <div class="w-[1px] h-4 bg-gray-200 mx-1 flex-shrink-0"></div>

                <!-- Category Chips -->
                <div id="category-chips-scroll" class="flex gap-2 pr-12">
                    <button onclick="setCategory('Electrician')"
                        class="cat-chip flex-shrink-0 px-4 py-1.5 rounded-full bg-white text-gray-600 text-[13px] font-semibold border border-gray-100 shadow-sm transition-all active:scale-95">Electrician</button>
                    <button onclick="setCategory('Plumber')"
                        class="cat-chip flex-shrink-0 px-4 py-1.5 rounded-full bg-white text-gray-600 text-[13px] font-semibold border border-gray-100 shadow-sm transition-all active:scale-95">Plumber</button>
                    <button onclick="setCategory('Driver')"
                        class="cat-chip flex-shrink-0 px-4 py-1.5 rounded-full bg-white text-gray-600 text-[13px] font-semibold border border-gray-100 shadow-sm transition-all active:scale-95">Driver</button>
                    <button onclick="setCategory('Cook')"
                        class="cat-chip flex-shrink-0 px-4 py-1.5 rounded-full bg-white text-gray-600 text-[13px] font-semibold border border-gray-100 shadow-sm transition-all active:scale-95">Cook</button>
                    <button onclick="setCategory('Carpenter')"
                        class="cat-chip flex-shrink-0 px-4 py-1.5 rounded-full bg-white text-gray-600 text-[13px] font-semibold border border-gray-100 shadow-sm transition-all active:scale-95">Carpenter</button>
                    <button onclick="setCategory('AC Technician')"
                        class="cat-chip flex-shrink-0 px-4 py-1.5 rounded-full bg-white text-gray-600 text-[13px] font-semibold border border-gray-100 shadow-sm transition-all active:scale-95">AC
                        Tech</button>
                    <button onclick="setCategory('Mason')"
                        class="cat-chip flex-shrink-0 px-4 py-1.5 rounded-full bg-white text-gray-600 text-[13px] font-semibold border border-gray-100 shadow-sm transition-all active:scale-95">Mason</button>
                    <button onclick="setCategory('Cleaning')"
                        class="cat-chip flex-shrink-0 px-4 py-1.5 rounded-full bg-white text-gray-600 text-[13px] font-semibold border border-gray-100 shadow-sm transition-all active:scale-95">Cleaning</button>
                    <button onclick="setCategory('Mechanic')"
                        class="cat-chip flex-shrink-0 px-4 py-1.5 rounded-full bg-white text-gray-600 text-[13px] font-semibold border border-gray-100 shadow-sm transition-all active:scale-95">Mechanic</button>
                </div>
            </div>
            <!-- Subtle Fade Out Effect -->
            <div
                class="absolute right-0 top-0 bottom-0 w-8 bg-gradient-to-l from-gray-50/10 to-transparent pointer-events-none">
            </div>
        </div>

        <!-- Nearby Count Bubble -->
        <div id="nearby-count-bubble"
            class="hidden pointer-events-auto self-center mt-2 px-4 py-1.5 bg-blue-600/90 backdrop-blur text-white text-xs font-bold rounded-full shadow-lg border border-blue-400/50 animate-bounce cursor-pointer"
            onclick="expandSummaryResults()">
            <span id="worker-count">0</span> workers nearby
        </div>

        <!-- Map Status Badge -->
        <div id="map-status-badge"
            class="hidden pointer-events-auto self-center mt-2 px-4 py-1.5 bg-white/90 backdrop-blur text-gray-700 text-[11px] font-bold rounded-full shadow-lg border border-gray-100 animate-fade-in">
        </div>

        <!-- Smart Notification -->
        <div id="smart-notification"
            class="hidden fixed top-6 left-1/2 -translate-x-1/2 z-[5000] pointer-events-auto bg-gray-900/90 backdrop-blur text-white px-6 py-3 rounded-2xl shadow-2xl border border-white/10 flex items-center gap-3 transition-all opacity-0">
            <span class="text-blue-400">ℹ️</span>
            <span id="smart-notification-text" class="text-[13px] font-medium">Notification</span>
        </div>

        <!-- GPS Activation Modal -->
        <div id="gps-modal"
            class="hidden fixed inset-0 z-[6000] flex items-center justify-center p-6 bg-black/60 backdrop-blur-sm transition-opacity duration-300 opacity-0">
            <div class="bg-white rounded-[32px] w-full max-w-sm p-8 shadow-2xl transform transition-all scale-95 opacity-0"
                id="gps-modal-content">
                <div class="w-20 h-20 bg-blue-50 rounded-full flex items-center justify-center mx-auto mb-6">
                    <svg xmlns="http://www.w3.org/2000/svg" class="h-10 w-10 text-blue-600" fill="none"
                        viewBox="0 0 24 24" stroke="currentColor">
                        <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2"
                            d="M17.657 16.657L13.414 20.9a1.998 1.998 0 01-2.827 0l-4.244-4.243a8 8 0 1111.314 0z" />
                        <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2"
                            d="M15 11a3 3 0 11-6 0 3 3 0 016 0z" />
                    </svg>
                </div>
                <h3 class="text-xl font-black text-gray-900 text-center mb-2" data-en="Enable GPS"
                    data-ta="GPS-ஐ இயக்கவும்">Enable GPS</h3>
                <p class="text-gray-500 text-center text-[13px] leading-relaxed mb-8"
                    data-en="Location access is required to show nearby workers and calculate accurate distances."
                    data-ta="அருகிலுள்ள ஊழியர்களைக் காட்டவும் துல்லியமான தூரத்தைக் கணக்கிடவும் இருப்பிட அணுகல் தேவை.">
                    Location access is required to show nearby workers and calculate accurate distances.</p>
                <button onclick="retryGPS()"
                    class="w-full py-4 bg-blue-600 text-white font-bold rounded-2xl shadow-lg shadow-blue-500/30 active:scale-95 transition-all"
                    data-en="Try Again" data-ta="மீண்டும் முயற்சிக்கவும்">Try Again</button>
            </div>
        </div>
    </div>

    <!-- GPS Status Badge -->
    <div id="gps-status" class="absolute bottom-[104px] left-4 z-[2000] hidden pointer-events-none animate-fade-in">
        <div class="bg-white px-4 py-2 rounded-full shadow-xl border border-gray-100 flex items-center gap-2.5">
            <div class="relative flex h-2.5 w-2.5">
                <div class="animate-ping absolute inline-flex h-full w-full rounded-full bg-green-400 opacity-75"></div>
                <div class="relative inline-flex rounded-full h-2.5 w-2.5 bg-green-500"></div>
            </div>
            <span class="text-xs font-bold text-gray-700 uppercase tracking-wide">GPS Active</span>
        </div>
    </div>

    <!-- Background Overlay (Dim Effect) -->
    <div id="sheet-overlay"
        class="fixed inset-0 bg-black/40 backdrop-blur-[2px] z-[3500] opacity-0 pointer-events-none transition-opacity duration-300 hidden"
        onclick="closeWorkerProfileSheet()">
    </div>

    <!-- Production-Grade Worker Profile UI (Adaptive) -->
    <div id="worker-profile-sheet"
        class="fixed z-[6000] mx-auto bg-white shadow-2xl flex flex-col pointer-events-auto hidden">

        <!-- Handle for Swipe (Visual Only on Mobile) -->
        <div class="w-full flex md:hidden justify-center py-3 cursor-grab active:cursor-grabbing"
            onclick="closeWorkerProfileSheet()">
            <div class="w-12 h-1.5 bg-gray-200 rounded-full"></div>
        </div>

        <!-- Close Button (X) -->
        <button onclick="closeWorkerProfileSheet()"
            class="absolute top-4 right-4 p-2 rounded-full bg-gray-50 text-gray-400 hover:text-gray-600 transition-colors z-[4010]">
            <svg xmlns="http://www.w3.org/2000/svg" class="h-5 w-5" viewBox="0 0 20 20" fill="currentColor">
                <path fill-rule="evenodd"
                    d="M4.293 4.293a1 1 0 011.414 0L10 8.586l4.293-4.293a1 1 0 111.414 1.414L11.414 10l4.293 4.293a1 1 0 01-1.414 1.414L10 11.414l-4.293 4.293a1 1 0 01-1.414-1.414L8.586 10 4.293 5.707a1 1 0 010-1.414z"
                    clip-rule="evenodd" />
            </svg>
        </button>

        <!-- Content Area -->
        <div id="sheet-content" class="px-6 pb-20 overflow-y-auto max-h-[80vh] scroll-smooth no-scrollbar">
            <!-- Dynamic content injected via JS -->
        </div>
    </div>

    <!-- Map Style Bottom Sheet -->
    <div id="map-style-sheet"
        class="fixed inset-x-0 bottom-0 z-[3000] bg-white rounded-t-[32px] shadow-2xl p-6 pb-10 border-t border-gray-100">
        <div class="w-12 h-1.5 bg-gray-200 rounded-full mx-auto mb-6"></div>
        <h3 class="text-lg font-bold text-gray-900 mb-6 text-center" data-en="Map Style" data-ta="வரைபட பாணி">Map Style
        </h3>

        <div class="grid grid-cols-3 gap-4">
            <button onclick="switchLayer('street')" class="flex flex-col items-center gap-2 group">
                <div
                    class="w-full aspect-square bg-blue-50 rounded-2xl border-2 border-transparent group-focus:border-blue-600 flex items-center justify-center transition-all overflow-hidden relative">
                    <img src="https://api.mapbox.com/styles/v1/mapbox/streets-v11/static/79.13,12.91,10/300x300?access_token=none"
                        class="opacity-0 absolute">
                    <span class="text-2xl">🗺️</span>
                </div>
                <span class="text-xs font-bold text-gray-600" data-en="Street" data-ta="தெரு">Street</span>
            </button>
            <button onclick="switchLayer('satellite')" class="flex flex-col items-center gap-2 group">
                <div
                    class="w-full aspect-square bg-blue-50 rounded-2xl border-2 border-transparent group-focus:border-blue-600 flex items-center justify-center transition-all overflow-hidden">
                    <span class="text-2xl">🛰️</span>
                </div>
                <span class="text-xs font-bold text-gray-600" data-en="Satellite"
                    data-ta="செயற்கைக்கோள்">Satellite</span>
            </button>
            <button onclick="switchLayer('hybrid')" class="flex flex-col items-center gap-2 group">
                <div
                    class="w-full aspect-square bg-blue-50 rounded-2xl border-2 border-transparent group-focus:border-blue-600 flex items-center justify-center transition-all overflow-hidden">
                    <span class="text-2xl">🌍</span>
                </div>
                <span class="text-xs font-bold text-gray-600" data-en="Hybrid" data-ta="கலப்பு">Hybrid</span>
            </button>
        </div>

        <button onclick="toggleMapStyleSheet()"
            class="w-full mt-8 py-4 bg-gray-50 text-gray-700 font-bold rounded-2xl active:scale-95 transition-all"
            data-en="Close" data-ta="மூடு">Close</button>
    </div>

    <!-- Map UI Controls (Right Side) -->
    <div class="absolute bottom-[180px] right-4 z-[2000] flex flex-col gap-3 pointer-events-none items-center">

        <!-- GPS Active Button (Circular with Glow) -->
        <button id="gps-button" onclick="locateUser()"
            class="pointer-events-auto w-12 h-12 bg-white rounded-full shadow-lg border border-gray-100 flex items-center justify-center text-gray-500 transition-all active:scale-95">
            <svg xmlns="http://www.w3.org/2000/svg" class="h-6 w-6" fill="currentColor" viewBox="0 0 24 24">
                <path
                    d="M12 8c-2.21 0-4 1.79-4 4s1.79 4 4 4 4-1.79 4-4-1.79-4-4-4zm8.94 3c-.49-4.47-4.03-8.01-8.5-8.5V2h-2v.5C5.97 2.99 2.43 6.53 1.94 11H1v2h.94c.49 4.47 4.03 8.01 8.5 8.5V22h2v-.5c4.47-.49 8.01-4.03 8.5-8.5H22v-2h-.94zM12 20c-4.41 0-8-3.59-8-8s3.59-8 8-8 8 3.59 8 8-3.59 8-8 8z" />
            </svg>
        </button>

        <!-- Zoom Controls -->
        <div
            class="pointer-events-auto bg-white rounded-2xl shadow-lg border border-gray-100 flex flex-col overflow-hidden">
            <button onclick="mapZoomIn()"
                class="w-12 h-12 flex items-center justify-center text-gray-600 hover:text-blue-600 active:bg-gray-50 border-b border-gray-50">
                <svg xmlns="http://www.w3.org/2000/svg" class="h-6 w-6" fill="none" viewBox="0 0 24 24"
                    stroke="currentColor">

    <script>
        // Language Logic with Persistence
        let currentLang = localStorage.getItem('nearva_lang') || 'en';

        // Initialize on load
        document.addEventListener('DOMContentLoaded', () => {
            updatePageLanguage();
            updateLangButtons();
        });

        function toggleLanguage() {
            currentLang = currentLang === 'en' ? 'ta' : 'en';
            localStorage.setItem('nearva_lang', currentLang);
            updatePageLanguage();
            updateLangButtons();

            // Trigger map re-load if necessary (e.g. to refresh popups with new lang)
            if (typeof loadWorkers === 'function') loadWorkers();
        }

        function updateLangButtons() {
            const display = currentLang === 'en' ? 'EN | தமிழ்' : 'தமிழ் | EN';
            const btn = document.getElementById('lang-display');
            if (btn) btn.textContent = display;
        }

        function updatePageLanguage() {
            const elements = document.querySelectorAll('[data-en]');
            const placeholders = document.querySelectorAll('[data-en-placeholder]');

            // Set HTML lang attribute
            document.documentElement.setAttribute('lang', currentLang);

            // Toggle Tamil mode class
            if (currentLang === 'ta') {
                document.body.classList.add('tamil-mode');
            } else {
                document.body.classList.remove('tamil-mode');
            }

            elements.forEach(el => {
                if (currentLang === 'ta' && el.dataset.ta) {
                    el.innerHTML = el.dataset.ta;
                } else if (el.dataset.en) {
                    el.innerHTML = el.dataset.en;
                }
            });

            placeholders.forEach(el => {
                if (currentLang === 'ta' && el.dataset.taPlaceholder) {
                    el.placeholder = el.dataset.taPlaceholder;
                } else if (el.dataset.enPlaceholder) {
                    el.placeholder = el.dataset.enPlaceholder;
                }
            });
        }
    </script>
